<script>
    /**
     * core navigation function
     * @param {string} pageId - The ID of the div to display
     */
    function showPage(pageId) {
        console.log("Switching to page:", pageId);
        
        // 1. Get all elements with the 'page' class
        const pages = document.querySelectorAll('.page');
        
        // 2. Hide every single one of them 
        // We use display: none to ensure they don't take up space
        pages.forEach(page => {
            page.style.display = 'none';
            page.classList.remove('active');
        });

        // 3. Find the specific page requested
        const targetPage = document.getElementById(pageId);
        
        if (targetPage) {
            targetPage.style.display = 'block';
            targetPage.classList.add('active');
            window.scrollTo(0, 0); // Reset scroll to top
            
            // 4. Trigger specific data loading for dynamic pages
            if (pageId === 'shop') renderProducts();
            if (pageId === 'gallery') renderGallery();
            
            console.log("Success: Navigation to " + pageId + " complete.");
        } else {
            console.error("Critical Error: Could not find an element with ID '" + pageId + "'. Check your HTML IDs.");
        }
    }

    // Initialize the home page as soon as the window loads
    window.onload = () => {
        console.log("System Initialized...");
        showPage('home');
    };
</script>
